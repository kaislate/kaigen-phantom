<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Concept 1: Clean Minimal</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;width:1400px;height:820px;font-family:'Inter',sans-serif;color:#fff;overflow:hidden}
.wrap{width:100%;height:100%;display:grid;grid-template-rows:48px 1fr;gap:1px;background:#161620}
.hdr{background:#0e0e16;display:flex;align-items:center;padding:0 24px;gap:16px}
.logo{font-size:20px;font-weight:300;letter-spacing:12px;color:#808090}
.brand{font-size:11px;font-weight:500;letter-spacing:5px;color:#404050;margin-left:auto}
.mode-sw{display:flex;gap:2px;background:#08080e;border-radius:6px;padding:2px}
.mode-btn{padding:6px 16px;border:none;background:none;color:#404050;font:500 10px/1 'Inter';letter-spacing:2px;text-transform:uppercase;cursor:pointer;border-radius:4px}
.mode-btn.active{background:#1a1a28;color:#c0c0d0}
.body{display:grid;grid-template-columns:320px 1fr;gap:1px;overflow:hidden}
/* Left - Wheel */
.wheel-panel{background:#0e0e16;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;padding:20px}
.wheel{width:260px;height:260px;border-radius:50%;border:1px solid #1a1a28;position:relative;display:flex;align-items:center;justify-content:center}
.wheel::before{content:'';position:absolute;inset:20px;border-radius:50%;border:1px solid #1a1a2a}
.wheel-center{width:100px;height:100px;border-radius:50%;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;border:1px solid #222}
.wheel-hz{font-size:20px;font-weight:300;color:#fff;font-family:'Inter'}
.wheel-note{font-size:9px;color:#606070;letter-spacing:2px}
.h-dot{position:absolute;width:8px;height:8px;border-radius:50%;background:#2a2a3a}
.h-dot:nth-child(2){top:8%;left:50%;transform:translateX(-50%)}
.h-dot:nth-child(3){top:20%;right:12%}
.h-dot:nth-child(4){top:52%;right:4%}
.h-dot:nth-child(5){bottom:12%;right:18%}
.h-dot:nth-child(6){bottom:12%;left:18%}
.h-dot:nth-child(7){top:52%;left:4%}
.h-dot:nth-child(8){top:20%;left:12%}
.h-dot.active{background:#6366f1;box-shadow:0 0 12px #6366f180}
.presets{display:flex;gap:16px}
.preset{font-size:9px;letter-spacing:2px;color:#303040;text-transform:uppercase;cursor:pointer}
.preset.active{color:#fff}
/* Right */
.right{display:flex;flex-direction:column;gap:1px;overflow:hidden}
.ctrl-area{display:flex;gap:1px;flex-shrink:0}
.panel{background:#0e0e16;padding:12px 14px;display:flex;flex-direction:column;gap:8px}
.panel-label{font-size:9px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:#404050}
.knobs{display:flex;gap:12px;align-items:flex-start;flex-wrap:wrap}
.knob{display:flex;flex-direction:column;align-items:center;gap:4px}
.knob-circle{width:52px;height:52px;border-radius:50%;background:#0a0a12;border:1px solid #1e1e2e;position:relative}
.knob-circle::after{content:'';position:absolute;top:6px;left:50%;width:2px;height:14px;background:#6366f1;transform:translateX(-50%) rotate(-30deg);transform-origin:bottom center;border-radius:1px}
.knob-circle.lg{width:72px;height:72px}
.knob-circle.lg::after{top:8px;height:18px}
.knob-name{font-size:8px;color:#505060;letter-spacing:1.5px;text-transform:uppercase}
.knob-val{font-size:10px;color:#808090;font-weight:300}
.panel.harmonic{flex:1}
.panel.ghost{flex:0.8}
.panel.stereo{flex:0.4}
.panel.env{flex:0.5}
.panel.filter{flex:0.4}
.panel.punch{flex:0.5}
.panel.output{flex:0.35}
/* Viz */
.viz{display:flex;gap:1px;flex:1;min-height:0}
.meter{width:14px;background:#08080e}
.viz-center{flex:1;display:flex;flex-direction:column;gap:1px;min-height:0}
.osc{height:120px;background:#08080e;border-radius:0;position:relative}
.osc::after{content:'';position:absolute;top:50%;left:5%;right:5%;height:1px;background:#1a1a28}
.spectrum{flex:1;background:#08080e;min-height:0}
.accent{color:#6366f1}
</style></head><body>
<div class="wrap">
  <div class="hdr">
    <div class="logo">PHANTOM</div>
    <div class="mode-sw">
      <div class="mode-btn active">Effect</div>
      <div class="mode-btn">Resyn</div>
    </div>
    <div class="brand">KAIGEN</div>
  </div>
  <div class="body">
    <div class="wheel-panel">
      <div class="wheel">
        <div class="h-dot active"></div><div class="h-dot active"></div><div class="h-dot"></div><div class="h-dot active"></div><div class="h-dot"></div><div class="h-dot active"></div><div class="h-dot"></div>
        <div class="wheel-center">
          <div class="wheel-hz">82</div>
          <div class="wheel-note">E2</div>
        </div>
      </div>
      <div class="presets">
        <span class="preset">Warm</span>
        <span class="preset">Aggr</span>
        <span class="preset">Hollow</span>
        <span class="preset active">Stable</span>
        <span class="preset">Dense</span>
        <span class="preset">Weird</span>
      </div>
    </div>
    <div class="right">
      <div class="ctrl-area">
        <div class="panel harmonic">
          <div class="panel-label">Harmonic Engine</div>
          <div class="knobs">
            <div class="knob"><div class="knob-circle lg"></div><div class="knob-name">Saturation</div></div>
            <div class="knob"><div class="knob-circle"></div><div class="knob-name">Strength</div></div>
            <div class="knob"><div class="knob-circle lg"></div><div class="knob-name">Shape</div></div>
            <div class="knob"><div class="knob-circle"></div><div class="knob-name">Push</div></div>
            <div class="knob"><div class="knob-circle"></div><div class="knob-name">H1</div></div>
            <div class="knob"><div class="knob-circle"></div><div class="knob-name">Length</div></div>
            <div class="knob"><div class="knob-circle"></div><div class="knob-name">Gate</div></div>
            <div class="knob"><div class="knob-circle"></div><div class="knob-name">Skip</div></div>
            <div class="knob"><div class="knob-circle"></div><div class="knob-name">Lo</div></div>
            <div class="knob"><div class="knob-circle"></div><div class="knob-name">Hi</div></div>
            <div class="knob"><div class="knob-circle"></div><div class="knob-name">Track</div></div>
          </div>
        </div>
      </div>
      <div class="ctrl-area">
        <div class="panel ghost"><div class="panel-label">Ghost</div><div class="knobs"><div class="knob"><div class="knob-circle lg"></div><div class="knob-name">Amount</div></div><div class="knob"><div class="knob-circle"></div><div class="knob-name">Crossover</div></div></div></div>
        <div class="panel stereo"><div class="panel-label">Stereo</div><div class="knobs"><div class="knob"><div class="knob-circle lg"></div><div class="knob-name">Width</div></div></div></div>
        <div class="panel env"><div class="panel-label">Envelope</div><div class="knobs"><div class="knob"><div class="knob-circle"></div><div class="knob-name">Attack</div></div><div class="knob"><div class="knob-circle"></div><div class="knob-name">Release</div></div></div></div>
        <div class="panel filter"><div class="panel-label">Filter</div><div class="knobs"><div class="knob"><div class="knob-circle"></div><div class="knob-name">LPF</div></div><div class="knob"><div class="knob-circle"></div><div class="knob-name">HPF</div></div></div></div>
        <div class="panel punch"><div class="panel-label">Punch</div><div class="knobs"><div class="knob"><div class="knob-circle"></div><div class="knob-name">Amount</div></div><div class="knob"><div class="knob-circle"></div><div class="knob-name">Thresh</div></div><div class="knob"><div class="knob-circle"></div><div class="knob-name">Boost</div></div></div></div>
        <div class="panel output"><div class="panel-label">Output</div><div class="knobs"><div class="knob"><div class="knob-circle lg"></div><div class="knob-name">Gain</div></div></div></div>
      </div>
      <div class="viz">
        <div class="meter"></div>
        <div class="viz-center">
          <div class="osc"></div>
          <div class="spectrum"></div>
        </div>
        <div class="meter"></div>
      </div>
    </div>
  </div>
</div>
</body></html>
