<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Concept 9: Neural Network</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#050510;width:1400px;height:820px;font-family:'IBM Plex Mono',monospace;color:#fff;overflow:hidden}
@keyframes neuralPulse{0%,100%{opacity:0.3}50%{opacity:0.8}}
.wrap{width:100%;height:100%;display:grid;grid-template-rows:48px 1fr;position:relative}
/* Background neural grid */
.wrap::before{content:'';position:absolute;inset:0;
  background-image:radial-gradient(circle at 1px 1px,rgba(80,140,255,0.04) 1px,transparent 1px);
  background-size:40px 40px;pointer-events:none;z-index:0}
.hdr{display:flex;align-items:center;padding:0 24px;gap:16px;z-index:1;
  background:rgba(5,5,16,0.9);border-bottom:1px solid rgba(80,140,255,0.08)}
.logo{font-size:18px;font-weight:300;letter-spacing:10px;color:rgba(80,140,255,0.7);
  text-shadow:0 0 10px rgba(80,140,255,0.3)}
.brand{font-size:10px;font-weight:400;letter-spacing:6px;color:rgba(80,140,255,0.2);margin-left:auto}
.status-bar{font-size:10px;color:rgba(80,140,255,0.4);display:flex;gap:12px}
.status-dot{width:6px;height:6px;border-radius:50%;background:rgba(80,255,140,0.6);
  box-shadow:0 0 6px rgba(80,255,140,0.3);animation:neuralPulse 2s ease-in-out infinite}
.mode-sw{display:flex;gap:4px}
.mode-btn{padding:4px 14px;border:1px solid rgba(80,140,255,0.1);background:none;color:rgba(80,140,255,0.2);
  font:400 9px/1 'IBM Plex Mono';letter-spacing:2px;cursor:pointer;border-radius:2px}
.mode-btn.active{border-color:rgba(80,140,255,0.4);color:rgba(80,140,255,0.8);
  background:rgba(80,140,255,0.05);box-shadow:0 0 10px rgba(80,140,255,0.08)}
/* Main layout — node graph inspired */
.body{display:grid;grid-template-columns:320px 1fr;gap:0;overflow:hidden;z-index:1;padding:8px}
/* Node panels */
.node{background:rgba(10,10,30,0.8);border:1px solid rgba(80,140,255,0.06);border-radius:8px;
  position:relative;overflow:visible}
.node::before{content:'';position:absolute;top:-1px;left:20px;width:40px;height:2px;
  background:linear-gradient(90deg,transparent,rgba(80,140,255,0.3),transparent)}
/* Connection lines between nodes */
.conn{position:absolute;height:1px;background:rgba(80,140,255,0.06);z-index:0}
.conn-dot{position:absolute;width:4px;height:4px;border-radius:50%;background:rgba(80,140,255,0.3);
  box-shadow:0 0 4px rgba(80,140,255,0.2);z-index:1;animation:neuralPulse 3s ease-in-out infinite}
/* Wheel as central node */
.wheel-panel{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:16px;margin-right:8px}
.wheel{width:250px;height:250px;border-radius:50%;position:relative;display:flex;align-items:center;justify-content:center;
  border:1px solid rgba(80,140,255,0.12);
  background:radial-gradient(circle,rgba(80,140,255,0.03) 0%,transparent 60%);
  box-shadow:0 0 40px rgba(80,140,255,0.04)}
/* Synaptic connections from center */
.synapse{position:absolute;width:1px;transform-origin:bottom center;
  background:linear-gradient(to top,rgba(80,140,255,0.4),rgba(80,255,140,0.2),transparent)}
.synapse:nth-child(1){height:45px;top:4px;left:50%;transform:translateX(-50%)}
.synapse:nth-child(2){height:35px;top:22px;right:30px;transform:rotate(52deg)}
.synapse:nth-child(3){height:30px;top:85px;right:8px;transform:rotate(90deg)}
.synapse:nth-child(4){height:38px;bottom:25px;right:38px;transform:rotate(140deg)}
.synapse:nth-child(5){height:25px;bottom:25px;left:38px;transform:rotate(218deg)}
.synapse:nth-child(6){height:32px;top:85px;left:8px;transform:rotate(270deg)}
.synapse:nth-child(7){height:40px;top:22px;left:30px;transform:rotate(308deg)}
/* Terminal nodes at synapse tips */
.terminal{position:absolute;width:8px;height:8px;border-radius:50%;
  background:rgba(80,140,255,0.2);border:1px solid rgba(80,140,255,0.4);
  box-shadow:0 0 6px rgba(80,140,255,0.15)}
.terminal:nth-child(8){top:0;left:50%;transform:translateX(-50%)}
.terminal:nth-child(9){top:14%;right:6%}
.terminal:nth-child(10){top:48%;right:-1%}
.terminal:nth-child(11){bottom:14%;right:8%}
.terminal:nth-child(12){bottom:14%;left:8%}
.terminal:nth-child(13){top:48%;left:-1%}
.terminal:nth-child(14){top:14%;left:6%}
.wheel-center{width:90px;height:90px;border-radius:50%;background:rgba(5,5,16,0.9);
  border:1px solid rgba(80,140,255,0.2);display:flex;flex-direction:column;align-items:center;justify-content:center;
  box-shadow:0 0 20px rgba(80,140,255,0.06)}
.hz{font-size:20px;font-weight:300;color:rgba(80,255,140,0.8);text-shadow:0 0 8px rgba(80,255,140,0.3)}
.note{font-size:9px;color:rgba(80,140,255,0.4);letter-spacing:2px}
.presets{display:flex;gap:8px}
.preset{font-size:8px;color:rgba(80,140,255,0.1);cursor:pointer;letter-spacing:1px;padding:2px 6px;border:1px solid transparent;border-radius:2px}
.preset.active{color:rgba(80,140,255,0.7);border-color:rgba(80,140,255,0.2);
  background:rgba(80,140,255,0.03)}
.right{display:flex;flex-direction:column;gap:6px;overflow:hidden}
.ctrl-row{display:flex;gap:6px;flex-shrink:0}
.panel{padding:8px 10px;display:flex;flex-direction:column;gap:4px;border-radius:8px}
.panel-label{font-size:8px;font-weight:400;letter-spacing:3px;color:rgba(80,140,255,0.3);
  display:flex;align-items:center;gap:6px}
.panel-label::before{content:'';width:4px;height:4px;border-radius:50%;
  background:rgba(80,255,140,0.4);box-shadow:0 0 4px rgba(80,255,140,0.2)}
.knobs{display:flex;gap:6px;flex-wrap:wrap;justify-content:center}
.knob{display:flex;flex-direction:column;align-items:center;gap:2px}
.knob-neuron{width:42px;height:42px;border-radius:50%;position:relative;
  background:radial-gradient(circle at 40% 40%,rgba(80,140,255,0.08),rgba(5,5,16,0.8));
  border:1px solid rgba(80,140,255,0.1)}
.knob-neuron::after{content:'';position:absolute;top:4px;left:50%;width:1px;height:10px;
  background:rgba(80,255,140,0.5);transform:translateX(-50%) rotate(-30deg);transform-origin:bottom center;
  box-shadow:0 0 3px rgba(80,255,140,0.3)}
.knob-neuron.lg{width:56px;height:56px}
.knob-neuron.lg::after{height:14px;top:5px}
.knob-name{font-size:6px;color:rgba(80,140,255,0.2);letter-spacing:1.5px}
.p-he{flex:1}
.p-gh{flex:0.7}
.p-s{flex:0.38}
.p-pu{flex:0.48}
.p-o{flex:0.3}
.viz{display:flex;gap:6px;flex:1;min-height:0}
.meter{width:10px;border-radius:4px}
.viz-mid{flex:1;display:flex;flex-direction:column;gap:6px;min-height:0}
.osc{height:110px;border-radius:6px;position:relative}
.osc::after{content:'';position:absolute;top:50%;left:5%;right:5%;height:1px;background:rgba(80,140,255,0.04)}
.spec{flex:1;min-height:0;border-radius:6px}
/* Activity indicator */
.activity{position:absolute;top:6px;right:8px;display:flex;gap:2px;align-items:center}
.act-bar{width:2px;height:8px;background:rgba(80,255,140,0.3);border-radius:1px;animation:neuralPulse 1s ease-in-out infinite}
.act-bar:nth-child(2){height:12px;animation-delay:0.2s}
.act-bar:nth-child(3){height:6px;animation-delay:0.4s}
.act-bar:nth-child(4){height:14px;animation-delay:0.6s}
.act-bar:nth-child(5){height:8px;animation-delay:0.8s}
</style></head><body>
<div class="wrap">
  <div class="hdr">
    <div class="logo">PHANTOM</div>
    <div class="mode-sw"><div class="mode-btn active">EFFECT</div><div class="mode-btn">RESYN</div></div>
    <div class="status-bar"><div class="status-dot"></div><span>TRACKING</span></div>
    <div class="brand">KAIGEN</div>
  </div>
  <div class="body">
    <div class="node wheel-panel">
      <div class="wheel">
        <div class="synapse"></div><div class="synapse"></div><div class="synapse"></div><div class="synapse"></div><div class="synapse"></div><div class="synapse"></div><div class="synapse"></div>
        <div class="terminal"></div><div class="terminal"></div><div class="terminal"></div><div class="terminal"></div><div class="terminal"></div><div class="terminal"></div><div class="terminal"></div>
        <div class="wheel-center"><div class="hz">82</div><div class="note">E2</div></div>
      </div>
      <div class="presets">
        <span class="preset">warm</span><span class="preset">aggr</span><span class="preset">hollow</span>
        <span class="preset active">stable</span><span class="preset">dense</span><span class="preset">weird</span>
      </div>
    </div>
    <div class="right">
      <div class="ctrl-row">
        <div class="node panel p-he"><div class="panel-label">harmonic.engine</div><div class="knobs">
          <div class="knob"><div class="knob-neuron lg"></div><div class="knob-name">sat</div></div>
          <div class="knob"><div class="knob-neuron"></div><div class="knob-name">str</div></div>
          <div class="knob"><div class="knob-neuron lg"></div><div class="knob-name">shape</div></div>
          <div class="knob"><div class="knob-neuron"></div><div class="knob-name">push</div></div>
          <div class="knob"><div class="knob-neuron"></div><div class="knob-name">h1</div></div>
          <div class="knob"><div class="knob-neuron"></div><div class="knob-name">len</div></div>
          <div class="knob"><div class="knob-neuron"></div><div class="knob-name">gate</div></div>
          <div class="knob"><div class="knob-neuron"></div><div class="knob-name">skip</div></div>
          <div class="knob"><div class="knob-neuron"></div><div class="knob-name">lo</div></div>
          <div class="knob"><div class="knob-neuron"></div><div class="knob-name">hi</div></div>
          <div class="knob"><div class="knob-neuron"></div><div class="knob-name">trk</div></div>
        </div></div>
      </div>
      <div class="ctrl-row">
        <div class="node panel p-gh"><div class="panel-label">ghost</div><div class="knobs"><div class="knob"><div class="knob-neuron lg"></div><div class="knob-name">amt</div></div><div class="knob"><div class="knob-neuron"></div><div class="knob-name">xovr</div></div></div></div>
        <div class="node panel p-s"><div class="panel-label">stereo</div><div class="knobs"><div class="knob"><div class="knob-neuron lg"></div><div class="knob-name">wdt</div></div></div></div>
        <div class="node panel p-s"><div class="panel-label">env</div><div class="knobs"><div class="knob"><div class="knob-neuron"></div><div class="knob-name">atk</div></div><div class="knob"><div class="knob-neuron"></div><div class="knob-name">rel</div></div></div></div>
        <div class="node panel p-s"><div class="panel-label">filter</div><div class="knobs"><div class="knob"><div class="knob-neuron"></div><div class="knob-name">lpf</div></div><div class="knob"><div class="knob-neuron"></div><div class="knob-name">hpf</div></div></div></div>
        <div class="node panel p-pu"><div class="panel-label">punch</div><div class="knobs"><div class="knob"><div class="knob-neuron"></div><div class="knob-name">amt</div></div><div class="knob"><div class="knob-neuron"></div><div class="knob-name">thr</div></div><div class="knob"><div class="knob-neuron"></div><div class="knob-name">bst</div></div></div></div>
        <div class="node panel p-o"><div class="panel-label">output</div><div class="knobs"><div class="knob"><div class="knob-neuron lg"></div><div class="knob-name">gain</div></div></div></div>
      </div>
      <div class="viz">
        <div class="node meter"></div>
        <div class="viz-mid">
          <div class="node osc"><div class="activity"><div class="act-bar"></div><div class="act-bar"></div><div class="act-bar"></div><div class="act-bar"></div><div class="act-bar"></div></div></div>
          <div class="node spec"></div>
        </div>
        <div class="node meter"></div>
      </div>
    </div>
  </div>
</div>
</body></html>
