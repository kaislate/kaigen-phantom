<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Concept 6: Bioluminescent Deep Sea</title>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#020810;width:1400px;height:820px;font-family:'Quicksand',sans-serif;color:#fff;overflow:hidden;
  background-image:radial-gradient(ellipse at 30% 80%,#041828 0%,transparent 40%),
    radial-gradient(ellipse at 70% 20%,#0a1030 0%,transparent 40%),
    radial-gradient(ellipse at 50% 50%,#030818 0%,#020810 100%)}
@keyframes pulse{0%,100%{opacity:0.6}50%{opacity:1}}
@keyframes drift{0%{transform:translateY(0)}50%{transform:translateY(-3px)}100%{transform:translateY(0)}}
.wrap{width:100%;height:100%;display:grid;grid-template-rows:50px 1fr}
.hdr{display:flex;align-items:center;padding:0 24px;gap:16px;
  background:linear-gradient(180deg,rgba(0,180,255,0.03),transparent);
  border-bottom:1px solid rgba(0,180,255,0.08)}
.logo{font-size:22px;font-weight:300;letter-spacing:12px;color:rgba(0,200,255,0.7);
  text-shadow:0 0 20px rgba(0,180,255,0.3),0 0 40px rgba(0,180,255,0.1);animation:pulse 4s ease-in-out infinite}
.brand{font-size:11px;font-weight:500;letter-spacing:6px;color:rgba(180,100,255,0.4);margin-left:auto}
.mode-sw{display:flex;gap:4px;background:rgba(0,0,0,0.3);border-radius:20px;padding:3px}
.mode-btn{padding:5px 16px;border:none;background:none;color:rgba(0,180,255,0.2);
  font:500 10px/1 'Quicksand';letter-spacing:2px;text-transform:uppercase;cursor:pointer;border-radius:16px;transition:all .4s}
.mode-btn.active{background:rgba(0,180,255,0.08);color:rgba(0,220,255,0.8);
  box-shadow:0 0 15px rgba(0,180,255,0.1);text-shadow:0 0 8px rgba(0,180,255,0.4)}
.body{display:grid;grid-template-columns:340px 1fr;gap:6px;padding:6px;overflow:hidden}
/* Organic panels */
.bio{background:rgba(0,20,40,0.4);border:1px solid rgba(0,180,255,0.06);border-radius:16px;
  position:relative;overflow:hidden}
.bio::before{content:'';position:absolute;inset:0;border-radius:16px;
  background:radial-gradient(ellipse at 30% 20%,rgba(0,180,255,0.04) 0%,transparent 50%);pointer-events:none}
/* Wheel */
.wheel-panel{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:20px}
.wheel{width:260px;height:260px;border-radius:50%;position:relative;display:flex;align-items:center;justify-content:center;animation:drift 6s ease-in-out infinite;
  background:radial-gradient(circle,rgba(0,180,255,0.06) 30%,rgba(180,100,255,0.03) 60%,transparent 80%);
  border:1px solid rgba(0,180,255,0.1);box-shadow:0 0 60px rgba(0,180,255,0.06)}
.tendril{position:absolute;width:2px;background:linear-gradient(to top,rgba(0,180,255,0.5),rgba(180,100,255,0.3),transparent);
  transform-origin:bottom center;border-radius:2px;filter:blur(0.5px);animation:pulse 3s ease-in-out infinite}
.tendril:nth-child(1){height:40px;top:5px;left:50%;transform:translateX(-50%);animation-delay:0s}
.tendril:nth-child(2){height:30px;top:25px;right:32px;transform:rotate(50deg);animation-delay:0.4s}
.tendril:nth-child(3){height:25px;top:90px;right:8px;transform:rotate(90deg);animation-delay:0.8s}
.tendril:nth-child(4){height:35px;bottom:30px;right:40px;transform:rotate(140deg);animation-delay:1.2s}
.tendril:nth-child(5){height:20px;bottom:30px;left:40px;transform:rotate(220deg);animation-delay:1.6s}
.tendril:nth-child(6){height:28px;top:90px;left:8px;transform:rotate(270deg);animation-delay:2.0s}
.tendril:nth-child(7){height:33px;top:25px;left:32px;transform:rotate(310deg);animation-delay:2.4s}
.wheel-center{width:110px;height:110px;border-radius:50%;
  background:radial-gradient(circle,#020810,#010508);
  border:1px solid rgba(0,180,255,0.2);display:flex;flex-direction:column;align-items:center;justify-content:center;
  box-shadow:0 0 30px rgba(0,180,255,0.08),inset 0 0 20px rgba(0,0,0,0.5)}
.hz{font-size:24px;font-weight:300;color:rgba(0,220,255,0.9);text-shadow:0 0 15px rgba(0,180,255,0.5)}
.note{font-size:10px;color:rgba(180,100,255,0.6);letter-spacing:3px}
.presets{display:flex;gap:14px}
.preset{font-size:9px;letter-spacing:2px;color:rgba(0,180,255,0.15);cursor:pointer;transition:all .3s}
.preset.active{color:rgba(0,220,255,0.8);text-shadow:0 0 10px rgba(0,180,255,0.4)}
.right{display:flex;flex-direction:column;gap:6px;overflow:hidden}
.ctrl-row{display:flex;gap:6px;flex-shrink:0}
.panel{padding:10px 12px;display:flex;flex-direction:column;gap:6px;border-radius:16px}
.panel-label{font-size:9px;font-weight:500;letter-spacing:3px;text-transform:uppercase;color:rgba(0,180,255,0.3)}
.knobs{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.knob{display:flex;flex-direction:column;align-items:center;gap:3px}
.knob-orb{width:48px;height:48px;border-radius:50%;position:relative;
  background:radial-gradient(circle at 35% 35%,rgba(0,180,255,0.12),rgba(0,80,120,0.05),rgba(0,20,40,0.3));
  border:1px solid rgba(0,180,255,0.1);box-shadow:0 0 10px rgba(0,180,255,0.05)}
.knob-orb::after{content:'';position:absolute;top:5px;left:50%;width:2px;height:10px;
  background:linear-gradient(to bottom,rgba(0,220,255,0.8),transparent);transform:translateX(-50%) rotate(-30deg);transform-origin:bottom center;border-radius:1px;
  box-shadow:0 0 4px rgba(0,180,255,0.3)}
.knob-orb.lg{width:64px;height:64px}
.knob-orb.lg::after{height:14px;top:7px}
.knob-name{font-size:7px;color:rgba(0,180,255,0.25);letter-spacing:1.5px;text-transform:uppercase}
.p-he{flex:1}
.p-gh{flex:0.7}
.p-s{flex:0.4}
.p-pu{flex:0.5}
.p-o{flex:0.3}
.viz{display:flex;gap:6px;flex:1;min-height:0}
.meter{width:12px;border-radius:8px}
.viz-mid{flex:1;display:flex;flex-direction:column;gap:6px;min-height:0}
.osc{height:120px;border-radius:12px;position:relative}
.osc::after{content:'';position:absolute;top:50%;left:5%;right:5%;height:1px;background:rgba(0,180,255,0.06)}
.spec{flex:1;min-height:0;border-radius:12px}
/* Floating particles */
.particle{position:fixed;width:3px;height:3px;border-radius:50%;background:rgba(0,180,255,0.3);
  box-shadow:0 0 6px rgba(0,180,255,0.2);animation:drift 5s ease-in-out infinite;pointer-events:none;z-index:50}
</style></head><body>
<div class="particle" style="top:15%;left:20%;animation-delay:0s"></div>
<div class="particle" style="top:60%;left:85%;animation-delay:1s;background:rgba(180,100,255,0.3)"></div>
<div class="particle" style="top:80%;left:45%;animation-delay:2s"></div>
<div class="particle" style="top:30%;left:65%;animation-delay:3s;background:rgba(180,100,255,0.3)"></div>
<div class="wrap">
  <div class="hdr">
    <div class="logo">phantom</div>
    <div class="mode-sw"><div class="mode-btn active">Effect</div><div class="mode-btn">Resyn</div></div>
    <div class="brand">kaigen</div>
  </div>
  <div class="body">
    <div class="bio wheel-panel">
      <div class="wheel">
        <div class="tendril"></div><div class="tendril"></div><div class="tendril"></div><div class="tendril"></div><div class="tendril"></div><div class="tendril"></div><div class="tendril"></div>
        <div class="wheel-center"><div class="hz">82</div><div class="note">E2</div></div>
      </div>
      <div class="presets">
        <span class="preset">Warm</span><span class="preset">Aggr</span><span class="preset">Hollow</span>
        <span class="preset active">Stable</span><span class="preset">Dense</span><span class="preset">Weird</span>
      </div>
    </div>
    <div class="right">
      <div class="ctrl-row">
        <div class="bio panel p-he"><div class="panel-label">Harmonic Engine</div><div class="knobs">
          <div class="knob"><div class="knob-orb lg"></div><div class="knob-name">Saturation</div></div>
          <div class="knob"><div class="knob-orb"></div><div class="knob-name">Strength</div></div>
          <div class="knob"><div class="knob-orb lg"></div><div class="knob-name">Shape</div></div>
          <div class="knob"><div class="knob-orb"></div><div class="knob-name">Push</div></div>
          <div class="knob"><div class="knob-orb"></div><div class="knob-name">H1</div></div>
          <div class="knob"><div class="knob-orb"></div><div class="knob-name">Length</div></div>
          <div class="knob"><div class="knob-orb"></div><div class="knob-name">Gate</div></div>
          <div class="knob"><div class="knob-orb"></div><div class="knob-name">Skip</div></div>
          <div class="knob"><div class="knob-orb"></div><div class="knob-name">Lo</div></div>
          <div class="knob"><div class="knob-orb"></div><div class="knob-name">Hi</div></div>
          <div class="knob"><div class="knob-orb"></div><div class="knob-name">Track</div></div>
        </div></div>
      </div>
      <div class="ctrl-row">
        <div class="bio panel p-gh"><div class="panel-label">Ghost</div><div class="knobs"><div class="knob"><div class="knob-orb lg"></div><div class="knob-name">Amount</div></div><div class="knob"><div class="knob-orb"></div><div class="knob-name">Crossover</div></div></div></div>
        <div class="bio panel p-s"><div class="panel-label">Stereo</div><div class="knobs"><div class="knob"><div class="knob-orb lg"></div><div class="knob-name">Width</div></div></div></div>
        <div class="bio panel p-s"><div class="panel-label">Envelope</div><div class="knobs"><div class="knob"><div class="knob-orb"></div><div class="knob-name">Atk</div></div><div class="knob"><div class="knob-orb"></div><div class="knob-name">Rel</div></div></div></div>
        <div class="bio panel p-s"><div class="panel-label">Filter</div><div class="knobs"><div class="knob"><div class="knob-orb"></div><div class="knob-name">LPF</div></div><div class="knob"><div class="knob-orb"></div><div class="knob-name">HPF</div></div></div></div>
        <div class="bio panel p-pu"><div class="panel-label">Punch</div><div class="knobs"><div class="knob"><div class="knob-orb"></div><div class="knob-name">Amt</div></div><div class="knob"><div class="knob-orb"></div><div class="knob-name">Thr</div></div><div class="knob"><div class="knob-orb"></div><div class="knob-name">Boost</div></div></div></div>
        <div class="bio panel p-o"><div class="panel-label">Output</div><div class="knobs"><div class="knob"><div class="knob-orb lg"></div><div class="knob-name">Gain</div></div></div></div>
      </div>
      <div class="viz">
        <div class="bio meter"></div>
        <div class="viz-mid"><div class="bio osc"></div><div class="bio spec"></div></div>
        <div class="bio meter"></div>
      </div>
    </div>
  </div>
</div>
</body></html>
