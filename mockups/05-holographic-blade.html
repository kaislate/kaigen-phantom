<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Concept 5: Holographic Blade Runner</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#020208;width:1400px;height:820px;font-family:'Orbitron',sans-serif;color:#fff;overflow:hidden;position:relative}
@keyframes scan{0%{top:-5%}100%{top:105%}}
body::before{content:'';position:fixed;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,rgba(0,255,255,0.06),transparent);z-index:200;pointer-events:none;animation:scan 4s linear infinite}
@keyframes holoFlicker{0%,100%{opacity:0.95}25%{opacity:1}50%{opacity:0.92}75%{opacity:0.98}}
.wrap{width:100%;height:100%;display:grid;grid-template-rows:54px 1fr;animation:holoFlicker 3s ease-in-out infinite}
.hdr{display:flex;align-items:center;padding:0 24px;gap:20px;
  background:linear-gradient(90deg,rgba(0,255,255,0.03),transparent 30%,transparent 70%,rgba(255,0,128,0.03));
  border-bottom:1px solid rgba(0,255,255,0.15)}
.logo{font-size:22px;font-weight:900;letter-spacing:10px;
  background:linear-gradient(90deg,#00ffff,#ff0080);-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 10px rgba(0,255,255,0.3)) drop-shadow(0 0 20px rgba(255,0,128,0.2))}
.brand{font-size:11px;font-weight:400;letter-spacing:8px;color:#334;margin-left:auto}
.mode-sw{display:flex;gap:2px}
.mode-btn{padding:6px 18px;border:1px solid rgba(0,255,255,0.15);background:none;color:#335;
  font:500 9px/1 'Orbitron';letter-spacing:3px;text-transform:uppercase;cursor:pointer;clip-path:polygon(8px 0,100% 0,calc(100% - 8px) 100%,0 100%)}
.mode-btn.active{border-color:rgba(0,255,255,0.6);color:#0ff;background:rgba(0,255,255,0.05);
  box-shadow:0 0 15px rgba(0,255,255,0.15),inset 0 0 15px rgba(0,255,255,0.05);text-shadow:0 0 8px #0ff}
.body{display:grid;grid-template-columns:340px 1fr;gap:4px;padding:4px;overflow:hidden}
/* Holo panel */
.holo{background:rgba(0,255,255,0.01);border:1px solid rgba(0,255,255,0.08);position:relative;overflow:hidden;
  clip-path:polygon(0 0,calc(100% - 12px) 0,100% 12px,100% 100%,12px 100%,0 calc(100% - 12px))}
.holo::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(0,255,255,0.04) 0%,transparent 30%,transparent 70%,rgba(255,0,128,0.02) 100%);pointer-events:none}
.holo::after{content:'';position:absolute;top:0;right:0;width:12px;height:12px;border-bottom:1px solid rgba(0,255,255,0.15);transform:rotate(45deg) translate(4px,-4px)}
.wheel-panel{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:20px}
.wheel{width:260px;height:260px;border-radius:50%;position:relative;display:flex;align-items:center;justify-content:center;
  border:1px solid rgba(0,255,255,0.2);box-shadow:0 0 40px rgba(0,255,255,0.05),0 0 80px rgba(255,0,128,0.03)}
.wheel-ring{position:absolute;inset:15px;border-radius:50%;border:1px solid rgba(0,255,255,0.08)}
.wheel-ring2{position:absolute;inset:30px;border-radius:50%;border:1px dashed rgba(255,0,128,0.08)}
.wheel-center{width:100px;height:100px;border-radius:50%;background:rgba(0,0,0,0.8);
  border:1px solid rgba(0,255,255,0.3);display:flex;flex-direction:column;align-items:center;justify-content:center;
  box-shadow:0 0 20px rgba(0,255,255,0.1),inset 0 0 15px rgba(0,255,255,0.05)}
.hz{font-size:22px;font-weight:700;color:#0ff;text-shadow:0 0 8px #0ff,0 0 20px rgba(0,255,255,0.4)}
.note{font-size:9px;color:#ff0080;letter-spacing:3px;text-shadow:0 0 6px rgba(255,0,128,0.4)}
.h-glyph{position:absolute;font-size:9px;font-weight:700;letter-spacing:1px}
.h-glyph:nth-child(1){top:0;left:50%;transform:translateX(-50%);color:#0ff}
.h-glyph:nth-child(2){top:14%;right:6%;color:#ff0080}
.h-glyph:nth-child(3){top:48%;right:-2%;color:#0ff}
.h-glyph:nth-child(4){bottom:14%;right:6%;color:#ff0080}
.h-glyph:nth-child(5){bottom:14%;left:6%;color:#0ff}
.h-glyph:nth-child(6){top:48%;left:-2%;color:#ff0080}
.h-glyph:nth-child(7){top:14%;left:6%;color:#0ff}
.presets{display:flex;gap:10px}
.preset{font-size:8px;letter-spacing:2px;color:#223;cursor:pointer;padding:3px 8px;border:1px solid transparent}
.preset.active{color:#0ff;border-color:rgba(0,255,255,0.3);text-shadow:0 0 6px #0ff}
.right{display:flex;flex-direction:column;gap:4px;overflow:hidden}
.ctrl-row{display:flex;gap:4px;flex-shrink:0}
.panel{padding:10px 12px;display:flex;flex-direction:column;gap:6px}
.panel-label{font-size:8px;font-weight:500;letter-spacing:4px;text-transform:uppercase;color:rgba(0,255,255,0.4)}
.knobs{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.knob{display:flex;flex-direction:column;align-items:center;gap:3px}
.knob-hex{width:46px;height:46px;clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
  background:rgba(0,255,255,0.03);border:none;position:relative;display:flex;align-items:center;justify-content:center}
.knob-hex::before{content:'';position:absolute;inset:1px;clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
  border:1px solid rgba(0,255,255,0.15)}
.knob-hex::after{content:'';position:absolute;top:6px;width:2px;height:10px;background:#0ff;box-shadow:0 0 4px #0ff;
  transform:rotate(-30deg);transform-origin:bottom center}
.knob-hex.lg{width:62px;height:62px}
.knob-hex.lg::after{height:14px;top:8px}
.knob-name{font-size:6px;color:#335;letter-spacing:2px;text-transform:uppercase}
.p-he{flex:1}
.p-gh{flex:0.7}
.p-s{flex:0.4}
.p-pu{flex:0.5}
.p-o{flex:0.3}
.viz{display:flex;gap:4px;flex:1;min-height:0}
.meter{width:12px}
.viz-mid{flex:1;display:flex;flex-direction:column;gap:4px;min-height:0}
.osc{height:120px;position:relative}
.osc::after{content:'';position:absolute;top:50%;left:5%;right:5%;height:1px;background:rgba(0,255,255,0.08)}
.spec{flex:1;min-height:0}
</style></head><body>
<div class="wrap">
  <div class="hdr">
    <div class="logo">PHANTOM</div>
    <div class="mode-sw"><div class="mode-btn active">EFFECT</div><div class="mode-btn">RESYN</div></div>
    <div class="brand">KAIGEN</div>
  </div>
  <div class="body">
    <div class="holo wheel-panel">
      <div class="wheel">
        <div class="wheel-ring"></div><div class="wheel-ring2"></div>
        <div class="h-glyph">H2</div><div class="h-glyph">H3</div><div class="h-glyph">H4</div><div class="h-glyph">H5</div><div class="h-glyph">H6</div><div class="h-glyph">H7</div><div class="h-glyph">H8</div>
        <div class="wheel-center"><div class="hz">82</div><div class="note">E2</div></div>
      </div>
      <div class="presets">
        <span class="preset">WARM</span><span class="preset">AGGR</span><span class="preset">HLLW</span>
        <span class="preset active">STBL</span><span class="preset">DENS</span><span class="preset">WERD</span>
      </div>
    </div>
    <div class="right">
      <div class="ctrl-row">
        <div class="holo panel p-he"><div class="panel-label">// HARMONIC ENGINE</div><div class="knobs">
          <div class="knob"><div class="knob-hex lg"></div><div class="knob-name">SAT</div></div>
          <div class="knob"><div class="knob-hex"></div><div class="knob-name">STR</div></div>
          <div class="knob"><div class="knob-hex lg"></div><div class="knob-name">SHAPE</div></div>
          <div class="knob"><div class="knob-hex"></div><div class="knob-name">PUSH</div></div>
          <div class="knob"><div class="knob-hex"></div><div class="knob-name">H1</div></div>
          <div class="knob"><div class="knob-hex"></div><div class="knob-name">LEN</div></div>
          <div class="knob"><div class="knob-hex"></div><div class="knob-name">GATE</div></div>
          <div class="knob"><div class="knob-hex"></div><div class="knob-name">SKIP</div></div>
          <div class="knob"><div class="knob-hex"></div><div class="knob-name">LO</div></div>
          <div class="knob"><div class="knob-hex"></div><div class="knob-name">HI</div></div>
          <div class="knob"><div class="knob-hex"></div><div class="knob-name">TRK</div></div>
        </div></div>
      </div>
      <div class="ctrl-row">
        <div class="holo panel p-gh"><div class="panel-label">// GHOST</div><div class="knobs"><div class="knob"><div class="knob-hex lg"></div><div class="knob-name">AMT</div></div><div class="knob"><div class="knob-hex"></div><div class="knob-name">XOVR</div></div></div></div>
        <div class="holo panel p-s"><div class="panel-label">// STEREO</div><div class="knobs"><div class="knob"><div class="knob-hex lg"></div><div class="knob-name">WDT</div></div></div></div>
        <div class="holo panel p-s"><div class="panel-label">// ENV</div><div class="knobs"><div class="knob"><div class="knob-hex"></div><div class="knob-name">ATK</div></div><div class="knob"><div class="knob-hex"></div><div class="knob-name">REL</div></div></div></div>
        <div class="holo panel p-s"><div class="panel-label">// FLT</div><div class="knobs"><div class="knob"><div class="knob-hex"></div><div class="knob-name">LPF</div></div><div class="knob"><div class="knob-hex"></div><div class="knob-name">HPF</div></div></div></div>
        <div class="holo panel p-pu"><div class="panel-label">// PUNCH</div><div class="knobs"><div class="knob"><div class="knob-hex"></div><div class="knob-name">AMT</div></div><div class="knob"><div class="knob-hex"></div><div class="knob-name">THR</div></div><div class="knob"><div class="knob-hex"></div><div class="knob-name">BST</div></div></div></div>
        <div class="holo panel p-o"><div class="panel-label">// OUT</div><div class="knobs"><div class="knob"><div class="knob-hex lg"></div><div class="knob-name">GAIN</div></div></div></div>
      </div>
      <div class="viz">
        <div class="holo meter"></div>
        <div class="viz-mid"><div class="holo osc"></div><div class="holo spec"></div></div>
        <div class="holo meter"></div>
      </div>
    </div>
  </div>
</div>
</body></html>
